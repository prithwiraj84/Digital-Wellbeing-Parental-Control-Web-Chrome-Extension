<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Wellbeing</title>
  <link rel="stylesheet" href="lib/tailwind.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    html {
      width: 360px;
      min-height: 460px;
      background: transparent;
      border-radius: 16px;
      overflow: hidden;
    }
    body {
      width: 360px;
      min-height: 460px;
      border-radius: 16px;
      overflow-x: hidden;
      border: 1px solid rgba(0, 229, 255, 0.25);
      box-sizing: border-box;
    }
  </style>
</head>
<body class="bg-slate-950 p-4 select-none animate-fade-in">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-bold tracking-tight text-white">Aegis Wellbeing</h1>
        <p class="text-[10px] text-slate-400 font-medium">Screen Time & Parental Control</p>
      </div>
    </div>
    <button id="open-dashboard-icon" class="text-slate-400 hover:text-cyan-400 transition-colors p-1.5 rounded-lg hover:bg-slate-800/50">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
  </div>

  <!-- Today's Summary Card -->
  <div class="glass-card rounded-xl p-4 mb-4 flex flex-col items-center justify-center text-center animate-fade-in-up">
    <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1">Today's Screen Time</span>
    <h2 id="total-time-today" class="text-3xl font-extrabold tracking-tight glow-text-cyan my-1">0h 0m</h2>
    <span id="bedtime-indicator" class="text-[10px] bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded-full mt-2 hidden flex items-center gap-1">
      <span class="w-1.5 h-1.5 rounded-full bg-red-400 animate-pulse"></span>
      Bedtime Mode Active
    </span>
  </div>

  <!-- Focus Mode Card -->
  <div class="glass-card rounded-xl p-4 mb-4 animate-fade-in-up" style="animation-delay: 0.1s;">
    <div class="flex items-center justify-between">
      <div>
        <h3 class="text-sm font-semibold text-white">Focus Mode</h3>
        <p class="text-xs text-slate-400">Blocks all sites except educational allowlist</p>
      </div>
      <label class="switch-container">
        <input type="checkbox" id="focus-toggle" class="switch-input">
        <span class="switch-slider"></span>
      </label>
    </div>
  </div>

  <!-- Top Sites Section -->
  <div class="glass-card rounded-xl p-4 mb-4 animate-fade-in-up" style="animation-delay: 0.2s;">
    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Top Sites Today</h3>
    <div id="top-sites-list" class="space-y-3">
      <!-- Loading State / Placeholder -->
      <div class="flex flex-col items-center justify-center py-4 text-slate-400 text-xs">
        <svg class="animate-spin h-5 w-5 text-cyan-400 mb-2" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Loading stats...
      </div>
    </div>
  </div>

  <!-- Footer Button -->
  <button id="open-dashboard-btn" class="w-full py-2.5 rounded-xl glow-btn-cyan text-xs tracking-wide uppercase flex items-center justify-center gap-1.5 animate-fade-in-up" style="animation-delay: 0.3s;">
    <span>Open Full Dashboard</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
    </svg>
  </button>
  
  <script src="popup.js"></script>
</body>
</html>
