<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="12" y="12" rx="14" ry="14" width="776" height="156" fill="#0f172a" opacity="0.85"/>

  <!-- Card -->
  <g transform="translate(28,24)">
    <rect width="740" height="132" rx="12" ry="12" fill="#0b1220" filter="url(#shadow)"/>

    <!-- Left panel: icon + stats -->
    <g transform="translate(18,18)">
      <circle cx="36" cy="36" r="28" fill="url(#g)" />
      <text x="80" y="30" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Dashboard</text>
      <text x="80" y="54" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Today • 2 sessions</text>
    </g>

    <!-- Right: animated bars -->
    <g transform="translate(320,28)">
      <g fill="#1f2937">
        <rect x="0" y="6" width="220" height="14" rx="6" />
        <rect x="0" y="32" width="220" height="14" rx="6" />
        <rect x="0" y="58" width="220" height="14" rx="6" />
      </g>

      <!-- Animated indicators -->
      <rect x="0" y="6" width="120" height="14" rx="6" fill="#60a5fa">
        <animate attributeName="width" values="40;120;80;120" dur="3s" repeatCount="indefinite" />
      </rect>
      <rect x="0" y="32" width="80" height="14" rx="6" fill="#34d399">
        <animate attributeName="width" values="20;80;60;80" dur="2.6s" repeatCount="indefinite" />
      </rect>
      <rect x="0" y="58" width="150" height="14" rx="6" fill="#f59e0b">
        <animate attributeName="width" values="30;150;110;150" dur="3.4s" repeatCount="indefinite" />
      </rect>

      <!-- Metric numbers -->
      <text x="240" y="18" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">2h 18m</text>
      <text x="240" y="44" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">screen time</text>
      <text x="240" y="70" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">today</text>
    </g>

    <!-- subtle pulsing accent -->
    <circle cx="700" cy="100" r="6" fill="#60a5fa">
      <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
